<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savantik's Poker Palace</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold: #f0c040;
            --gold-dark: #b8860b;
            --gold-light: #ffe080;
            --felt: #1a4a22;
            --felt-dark: #0d2e14;
            --felt-mid: #1e5c28;
            --cream: #fdf6e3;
            --red: #c0392b;
        }

        body {
            font-family: 'Crimson Pro', Georgia, serif;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(30,92,40,0.6) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(192,57,43,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.5) 0%, transparent 60%),
                linear-gradient(160deg, #0d2e14 0%, #1a4a22 40%, #163d1c 70%, #0a1f0d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Subtle noise texture via SVG */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            background-size: 180px 180px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        .palace {
            position: relative;
            z-index: 1;
            max-width: 620px;
            width: 100%;
            text-align: center;
            animation: rise 1.4s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(48px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Ornamental top rule */
        .ornament {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            animation: rise 1.4s .1s cubic-bezier(.16,1,.3,1) both;
        }
        .ornament-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .ornament-diamond {
            width: 10px; height: 10px;
            background: var(--gold);
            transform: rotate(45deg);
            box-shadow: 0 0 8px var(--gold);
        }

        /* Card / panel */
        .panel {
            background:
                linear-gradient(160deg, rgba(255,255,255,0.04) 0%, rgba(0,0,0,0.0) 100%),
                rgba(8, 22, 10, 0.88);
            border: 1px solid rgba(240,192,64,0.35);
            border-radius: 24px;
            padding: 48px 44px 44px;
            box-shadow:
                0 0 0 1px rgba(240,192,64,0.1),
                0 0 60px rgba(0,0,0,0.6),
                0 0 120px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.06);
            position: relative;
            overflow: hidden;
        }

        /* Corner decorations */
        .panel::before, .panel::after {
            content: '♠';
            position: absolute;
            font-size: 5rem;
            color: rgba(240,192,64,0.06);
            font-family: serif;
            line-height: 1;
        }
        .panel::before { top: -10px; left: 10px; }
        .panel::after  { bottom: -10px; right: 10px; transform: rotate(180deg); }

        h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 900;
            letter-spacing: 3px;
            line-height: 1.15;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 45%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 6px;
            filter: drop-shadow(0 2px 12px rgba(240,192,64,0.3));
            animation: rise 1.4s .15s cubic-bezier(.16,1,.3,1) both;
        }

        .suits {
            font-size: 1.4rem;
            letter-spacing: 12px;
            margin-bottom: 22px;
            opacity: 0.7;
            animation: rise 1.4s .2s cubic-bezier(.16,1,.3,1) both;
        }

        .tagline {
            font-size: 1.15rem;
            font-weight: 300;
            font-style: italic;
            color: rgba(253,246,227,0.75);
            line-height: 1.7;
            margin-bottom: 36px;
            animation: rise 1.4s .25s cubic-bezier(.16,1,.3,1) both;
        }

        /* ── Image link wrapper ── */
        .image-link {
            display: block;
            position: relative;
            border-radius: 16px;
            overflow: visible;
            text-decoration: none;
            animation: rise 1.4s .3s cubic-bezier(.16,1,.3,1) both;
        }

        .image-wrap {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(240,192,64,0.5);
            box-shadow:
                0 0 0 1px rgba(240,192,64,0.15),
                0 8px 40px rgba(0,0,0,0.5),
                0 0 30px rgba(240,192,64,0.1);
            transition: box-shadow 0.4s ease, transform 0.4s ease;
        }

        .image-link:hover .image-wrap {
            transform: scale(1.015) translateY(-3px);
            box-shadow:
                0 0 0 2px rgba(240,192,64,0.5),
                0 16px 60px rgba(0,0,0,0.6),
                0 0 50px rgba(240,192,64,0.25);
        }

        .poker-image {
            width: 100%;
            height: auto;
            display: block;
            transition: filter 0.4s ease;
        }

        .image-link:hover .poker-image {
            filter: brightness(0.75);
        }

        /* Overlay on hover */
        .image-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            transition: background 0.4s ease;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .image-link:hover .image-overlay {
            background: rgba(0,0,0,0.22);
        }

        /* ── CTA badge ── */
        .cta-badge {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%) translateY(0);
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #c0392b 0%, #96281b 100%);
            border: 2px solid var(--gold);
            border-radius: 50px;
            padding: 10px 24px;
            white-space: nowrap;
            box-shadow:
                0 4px 20px rgba(0,0,0,0.5),
                0 0 20px rgba(192,57,43,0.3),
                inset 0 1px 0 rgba(255,255,255,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            z-index: 10;
        }

        .image-link:hover .cta-badge {
            transform: translateX(-50%) translateY(-3px);
            box-shadow:
                0 8px 28px rgba(0,0,0,0.5),
                0 0 30px rgba(192,57,43,0.5),
                inset 0 1px 0 rgba(255,255,255,0.2);
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .arrow {
            font-size: 1.3rem;
            color: var(--gold);
            animation: bounce-lr 1.2s ease-in-out infinite;
        }
        .arrow.right { animation-direction: alternate-reverse; }

        @keyframes bounce-lr {
            0%, 100% { transform: translateX(0); }
            50%       { transform: translateX(5px); }
        }

        .cta-text {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--gold-light);
            text-transform: uppercase;
        }

        /* Bottom ornament */
        .bottom-ornament {
            margin-top: 48px;
            display: flex;
            align-items: center;
            gap: 14px;
            animation: rise 1.4s .35s cubic-bezier(.16,1,.3,1) both;
        }
        .bottom-ornament .ornament-line {
            background: linear-gradient(90deg, transparent, rgba(240,192,64,0.4), transparent);
        }
        .bottom-tag {
            font-family: 'Crimson Pro', serif;
            font-size: 0.78rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(240,192,64,0.45);
        }
    </style>
</head>
<body>
    <div class="palace">

        <div class="ornament">
            <div class="ornament-line"></div>
            <div class="ornament-diamond"></div>
            <div class="ornament-line"></div>
        </div>

        <div class="panel">
            <h1>Poker Palace</h1>
            <div class="suits">♠ &nbsp; ♥ &nbsp; ♦ &nbsp; ♣</div>

            <p class="tagline">
                Welcome to the most exclusive Poker Simulator on GitHub Pages.<br>
                Built with passion — hosted for winners.
            </p>

            <!-- Clickable image -->
            <a class="image-link" href="https://Savantik.github.io/poker" target="_blank" rel="noopener noreferrer">
                <div class="image-wrap">
                    <img src="pok.jpeg" alt="Poker Experience" class="poker-image">
                    <div class="image-overlay"></div>
                </div>

                <!-- Arrows CTA -->
                <div class="cta-badge">
                    <span class="arrow">▶</span>
                    <span class="cta-text">Click here for poker gambling</span>
                    <span class="arrow right">▶</span>
                </div>
            </a>
        </div>

        <div class="bottom-ornament">
            <div class="ornament-line"></div>
            <div class="ornament-diamond"></div>
            <span class="bottom-tag">Savantik's Palace</span>
            <div class="ornament-diamond"></div>
            <div class="ornament-line"></div>
        </div>

    </div>
</body>
</html>
