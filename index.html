<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savantik's Poker Palace</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #2e7d32 0%, #1b5e20 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 30px;
            border: 4px solid #ffd700;
            box-shadow: 0 0 50px rgba(0,0,0,0.7), 0 0 30px #ffd700;
            text-align: center;
            max-width: 600px; /* Iets breder voor de grote foto */
            animation: fadeIn 1.5s ease-out;
        }
        h1 {
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0 0 15px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            font-size: 2.5rem;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #f0f0f0;
        }
        .poker-image {
            width: 100%; /* Maakt de foto groot */
            max-width: 500px;
            height: auto;
            border-radius: 15px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            transition: transform 0.3s ease;
        }
        .poker-image:hover {
            transform: scale(1.02); /* Klein effect als je eroverheen gaat */
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>♠️ Poker Palace ♥️</h1>
        <p>Welcome to the most exclusive Poker Simulator on GitHub Pages. Built with passion, hosted for winners.</p>
        
        <!-- De grote foto -->
        <img src="pok.jpeg" alt="Poker Experience" class="poker-image">
    </div>

</body>
</html>
